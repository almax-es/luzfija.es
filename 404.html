<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,follow">
  <meta name="theme-color" content="#8B5CF6">
  <link rel="manifest" href="/manifest.webmanifest">
  <title>Página no encontrada | LuzFija.es</title>
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="icon" type="image/png" sizes="48x48" href="/favicon-48x48.png">
  <link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="mask-icon" href="/favicon.svg" color="#8B5CF6">
  <script>
    (function(){
      var key='almax_theme';
      try{
        var saved=localStorage.getItem(key);
        var isLight = (saved==='light');
        document.documentElement.classList.toggle('light-mode', isLight);
        document.addEventListener('DOMContentLoaded', function(){
          if (document.body) document.body.classList.toggle('light-mode', isLight);
        }, {once:true});
        window.__ALMAX_THEME_SAVED=saved;
      }catch(e){}
      window.__ALMAX_THEME_KEY=key;
    })();
  </script>

  <link rel="stylesheet" href="/styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
  <a class="skip-link" href="#main">Saltar al contenido</a>
  <main id="main" tabindex="-1">
<div class="container" style="text-align: center; padding: 80px 20px;">
  <h1 style="font-size: 72px; margin-bottom: 16px;">404</h1>
  <h2 style="font-size: 32px; margin-bottom: 24px;">Página no encontrada</h2>
  <p style="font-size: 18px; color: var(--muted); margin-bottom: 40px;">
    La página que buscas no existe o ha sido movida.
  </p>
  <div style="display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; margin-top: 40px;">
    <a href="/" style="padding: 12px 24px; background: var(--accent); color: white; text-decoration: none; border-radius: 8px; font-weight: 600;">Ir al comparador</a>
    <a href="/guias.html" style="padding: 12px 24px; background: var(--card); border: 1px solid var(--border); color: var(--text); text-decoration: none; border-radius: 8px; font-weight: 600;">Ver guías</a>
  </div>
</div>
  </main>
</body>
</html>
