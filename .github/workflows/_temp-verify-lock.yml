name: _temp-verify-lock

on:
  push:
    branches: [ "main" ]
    paths: [ ".github/workflows/_temp-verify-lock.yml" ]
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: npm ci
        run: npm ci

      - name: npm test
        run: npm test
